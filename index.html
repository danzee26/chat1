<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="card mt-3">
    <div class="card-header">
      Чат менеджер ↔ закупщик
    </div>

    <div class="card-body p-2">
      <div id="chatMessages" class="border rounded p-2 mb-2" style="height:300px; overflow-y:auto;">
      </div>

      <div class="input-group">
        <textarea id="chatInput" class="form-control" placeholder="Введите сообщение"></textarea>
        <button id="sendBtn" class="btn btn-primary">Отправить</button>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>

    function escapeHtml(text) {
      return $('<div>').text(text).html();
    }

    function addMessage(author, text, time) {
      $('#chatMessages').append(`
    <div class="mb-2">
      <small class="text-muted">${author} — ${time}</small>
      <div class="border rounded p-2">${escapeHtml(text)}</div>
    </div>
  `);

      $('#chatMessages').scrollTop($('#chatMessages')[0].scrollHeight);
    }

    $('#sendBtn').on('click', function () {
      const text = $('#chatInput').val().trim();
      if (!text) return;
      addMessage('Вы', text, new Date().toLocaleTimeString());
      $('#chatInput').val('');
    });
  </script>

</body>

</html>
