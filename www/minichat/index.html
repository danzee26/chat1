<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minichat - Выбор чата</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="container-fluid vh-100 p-0 overflow-hidden">
      <div class="d-flex h-100">
        <div
          class="bg-light border-end d-flex flex-column"
          style="width: 20%; min-width: 200px"
        >
          <div class="p-3 border-bottom bg-white fw-bold">Список заказов</div>
          <div class="list-group list-group-flush overflow-auto flex-grow-1">
            <button
              class="chat-select list-group-item list-group-item-action active"
              data-id="1"
            >
              Заказ №1<br /><small class="text-muted">Менеджер: Иван</small>
            </button>
            <button
              class="chat-select list-group-item list-group-item-action"
              data-id="2"
            >
              Заказ №2<br /><small class="text-muted">Менеджер: Анна</small>
            </button>
          </div>
        </div>

        <div class="d-flex flex-column flex-grow-1" style="width: 80%">
          <div class="border-bottom bg-white overflow-auto" style="height: 20%">
            <div class="p-2 small fw-bold text-secondary border-bottom">
              Товары в заказе
            </div>
            <div class="p-2 d-flex flex-wrap gap-2">
              <div class="border rounded p-2 bg-light" style="min-width: 150px">
                <div class="small fw-bold text-truncate">
                  Арт. 12345: Болт М10
                </div>
                <div class="small">Кол-во: 500 шт.</div>
              </div>
              <div class="border rounded p-2 bg-light" style="min-width: 150px">
                <div class="small fw-bold text-truncate">
                  Арт. 67890: Гайка М10
                </div>
                <div class="small">Кол-во: 1000 шт.</div>
              </div>
            </div>
          </div>

          <div
            class="d-flex flex-column flex-grow-1 overflow-hidden"
            style="height: 80%"
          >
            <div
              id="chatMessages"
              class="flex-grow-1 p-3 overflow-auto bg-white"
            ></div>

            <div class="p-3 border-top bg-light">
              <div class="chat-input-wrap">
                <div
                  id="emojiPanel"
                  class="emoji-panel"
                  aria-hidden="true"
                ></div>
                <div class="input-group">
                  <button
                    id="emojiToggle"
                    type="button"
                    class="btn btn-outline-secondary"
                  >
                    😀
                  </button>
                  <textarea
                    id="chatInput"
                    class="form-control"
                    rows="1"
                    placeholder="Введите сообщение..."
                  ></textarea>
                  <button id="sendBtn" class="btn btn-primary">
                    Отправить
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/js/minichat.js"></script>
  </body>
</html>
