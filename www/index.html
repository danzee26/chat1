<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    #chatMessages {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  /* Общий контейнер сообщения */
  .message {
    display: flex;
    width: 100%;
  }
  /* Собеседник слева */
  .message-in {
    justify-content: flex-start;
  }
  /* Вы справа */
  .message-out {
    justify-content: flex-end;
  }
  /* Пузырь сообщения */
  .bubble {
    max-width: 70%;
    padding: 6px 8px 4px;
    border-radius: 12px;
    position: relative;
    display: inline-flex;
    flex-direction: column;
    background: #ffffff;
  }
  /* Входящие */
  .message-in .bubble {
    background: #ffffff;
    border: 1px solid #e4e4e4;
    border-radius: 12px 12px 12px 0;
  }
  /* Исходящие (как в Телеграме) */
  .message-out .bubble {
    background: #d1f4ff;
    border-radius: 12px 12px 0 12px;
  }
  /* Текст сообщения (с переносами по Enter) */
  .bubble-text {
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Время справа внизу */
  .bubble-time {
    align-self: flex-end;
    font-size: 0.75rem;
    color: #6c757d;
    margin-top: 2px;
  }
  </style>
</head>

<body>
  <div class="card m-5">
    <div class="card-header">
      Чат менеджер ↔ закупщик
    </div>

    <div class="card-body p-2">
      <div id="chatMessages" class="border rounded p-2 mb-2" style="height:300px; overflow-y:auto;">
      </div>

      <div class="input-group">
        <textarea id="chatInput" class="form-control" placeholder="Введите сообщение"></textarea>
        <button id="sendBtn" class="btn btn-primary">Отправить</button>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/minichat.js"></script>

</body>

</html>
