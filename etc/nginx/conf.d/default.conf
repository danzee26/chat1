server {
    listen 80;
    server_name localhost;
    root /var/www; # Общий корень для всех файлов
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # --- ДОБАВЛЯЕМ ЭТОТ БЛОК ДЛЯ PHP ---
    location ~ \.php$ {
    fastcgi_pass php:9000; # Имя сервиса из docker-compose
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

    # Прокси для n8n
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Прокси для phpMyAdmin
    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin/; # Слэш в конце важен
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Добавляем эти строки, чтобы phpMyAdmin понимал, где он находится
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}