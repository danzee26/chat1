services:
  # База данных
  mysql:
    image: mysql:8.0
    container_name: chat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin_pass
      MYSQL_DATABASE: minichat_db
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./etc/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - app_net

  # Интерфейс для управления базой
  phpmyadmin:
    image: phpmyadmin:fpm-alpine
    container_name: chat_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
    volumes:
      - phpmyadmin:/var/www/html
      - ./etc/phpmyadmin/php.ini:/usr/local/etc/php/conf.d/z-custom.ini
    depends_on:
      - mysql
    networks:
      - app_net
  # Новый сервис PHP
  php:
    build: ./docker/php # Указываем путь к папке с твоим PHP Dockerfile
    container_name: chat_php_fpm
    restart: unless-stopped
    volumes:
      - ./www:/var/www/
      - ./logs/php:/var/log/php
      - php_socket:/var/run/php
    networks:
      - app_net

  nginx:
    build: ./docker/nginx # Указываем путь к папке с твоим Nginx Dockerfile
    container_name: chat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www/
      - ./etc/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - php_socket:/var/run/php
      - phpmyadmin:/var/www/localhost/phpmyadmin:ro
    depends_on:
      - php
    networks:
      - app_net

volumes:
  php_socket:
  phpmyadmin:

networks:
  app_net:
    driver: bridge
